name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-build:
    name: Lint & Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: 🔍 Run flake8 linter
        run: |
          # Stop on syntax errors or undefined names; warn on style issues
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-line-length=120 --statistics --exit-zero

      - name: 🐳 Build Docker image
        run: |
          docker build -t investment-hub:ci .

      - name: ✅ Verify Docker image starts
        run: |
          docker run --rm -d \
            -e DATABASE_URL_LOCAL=postgresql+psycopg://postgres:postgres@localhost:5432/invest_db \
            -p 8001:8000 \
            --name test-container \
            investment-hub:ci
          sleep 5
          docker stop test-container || true
          echo "Docker build and start: SUCCESS"

name: CI Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-test-build:
    name: Lint, Test & Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov httpx
          pip install -r requirements.txt

      - name: 🔍 Run flake8 linter (app/)
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-line-length=120 --statistics --exit-zero

      - name: 🔍 Run flake8 linter (root collectors)
        run: |
          flake8 enhanced_collector.py normalizer.py scheduler_main.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 enhanced_collector.py normalizer.py scheduler_main.py \
            --count --max-line-length=120 --statistics --exit-zero

      - name: 🧪 Run pytest with coverage
        env:
          DATABASE_URL_LOCAL: "sqlite:///./test_ci.db"
          SECRET_KEY: "ci-test-secret-key-at-least-32-chars-long"
          ADMIN_PASSWORD: "Admin@12345!"
          ENABLE_METRICS: "false"
          ALLOWED_ORIGINS: "*"
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50
        continue-on-error: false

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: 🐳 Build Docker image
        run: |
          docker build -t investment-hub:ci .

      - name: ✅ Verify Docker image starts
        run: |
          docker run --rm -d \
            -e DATABASE_URL_LOCAL=sqlite:///./demo.db \
            -e SECRET_KEY=ci-test-secret-key-at-least-32-chars \
            -e ADMIN_PASSWORD=Admin@12345! \
            -e ENABLE_METRICS=false \
            -e ALLOWED_ORIGINS="*" \
            -p 8001:8000 \
            --name test-container \
            investment-hub:ci
          sleep 8
          curl -f http://localhost:8001/health || (docker logs test-container && exit 1)
          docker stop test-container || true
          echo "✅ Docker build and health-check: SUCCESS"

      - name: 🧹 Cleanup test DB
        if: always()
        run: rm -f test_ci.db test_temp.db
